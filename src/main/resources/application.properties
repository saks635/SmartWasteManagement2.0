spring.application.name=wastemanagement

server.port=8080

# ===============================
# Database
# ===============================
spring.data.mongodb.uri=mongodb://localhost:27017/wastemanagementdb

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false

# ===============================
# Google Maps API (ENV VARIABLE)
# ===============================
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# ===============================
# Redis Configuration (Production & Local)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# ===============================
# Cache (Redis)
# ===============================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=cache:
spring.cache.redis.use-key-prefix=true

# ===============================
# Session (Redis)
# ===============================
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.timeout=1800

# ===============================
# Google OAuth2 (ENV VARIABLES)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email
