<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Waste Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    🏢 Admin Dashboard
    <a href="/logout">Logout</a>
</div>

<div class="container">
    <h2>📋 All Complaints</h2>

    <div th:if="${complaints == null or complaints.isEmpty()}" style="text-align: center; padding: 40px; color: #999;">
        <p style="font-size: 18px;">No complaints found.</p>
    </div>

    <table th:if="${complaints != null and !complaints.isEmpty()}">
        <thead>
            <tr>
                <th>User</th>
                <th>Location</th>
                <th>Issue</th>
                <th>Status</th>
                <th>Assign Worker</th>
                <th>Track Worker</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${complaints}">
                <td th:text="${c.userName}"></td>
                <td th:text="${c.location}"></td>
                <td th:text="${c.issue}"></td>
                <td>
                    <span class="badge" th:text="${c.status}" th:classappend="' ' + ${c.status}"></span>
                </td>
                <td>
                    <form th:action="@{/admin/assign}" method="post" style="display: flex; gap: 8px; align-items: center;">
                        <input type="hidden" name="complaintId" th:value="${c.id}">
                        <select name="workerName" th:disabled="${c.status == 'CLEANED'}" required style="flex: 1; min-width: 150px;">
                            <option value="" disabled selected>Select Worker</option>
                            <option th:each="worker : ${workers}" 
                                    th:value="${worker.username}" 
                                    th:text="${worker.username}">
                            </option>
                        </select>
                        <button type="submit" th:disabled="${c.status == 'CLEANED'}" style="white-space: nowrap;">Assign</button>
                    </form>
                </td>
                <td>
                    <a th:href="@{'/admin/worker/' + ${c.assignedWorker}}"
                       th:if="${c.assignedWorker != null}"
                       style="padding: 6px 12px; background: #667eea; color: white; border-radius: 6px; display: inline-block;">
                        🗺️ View Map
                    </a>
                    <span th:if="${c.assignedWorker == null}" style="color: #999;">—</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
