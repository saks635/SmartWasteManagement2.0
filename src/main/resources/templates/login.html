<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Waste Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">Waste Management System</div>

<div class="container" style="max-width: 450px;">
    <h2>🔐 Login</h2>

    <div th:if="${param.error}" class="alert alert-error">
        ❌ Invalid username or password. Please try again.
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        ✅ You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="👤 Username" required autofocus>
        <input type="password" name="password" placeholder="🔒 Password" required>

        <button type="submit" style="width: 100%; margin-top: 10px;">Login</button>
    </form>

    <div style="text-align: center; margin: 20px 0;">
        <div style="display: flex; align-items: center; margin: 15px 0;">
            <div style="flex: 1; height: 1px; background: #ddd;"></div>
            <span style="padding: 0 10px; color: #666; font-size: 14px;">OR</span>
            <div style="flex: 1; height: 1px; background: #ddd;"></div>
        </div>
    </div>

    <a th:href="@{/oauth2/authorization/google}" style="display: block; text-decoration: none;">
        <button type="button" style="width: 100%; padding: 12px; background: #fff; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 16px; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s;">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>
    </a>

    <div style="text-align: center; margin-top: 20px;">
        <p style="color: #666; font-size: 14px;">
            Don't have an account? 
            <a href="/register" style="color: #667eea; font-weight: 600;">Register here</a>
        </p>
    </div>
</div>

</body>
</html>
