<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Waste Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">Waste Management System</div>

<div class="container" style="max-width: 450px;">
    <h2>📝 Register</h2>

    <div th:if="${error}" class="alert alert-error">
        ❌ <span th:text="${error}"></span>
    </div>

    <div th:if="${success}" class="alert alert-success">
        ✅ <span th:text="${success}"></span>
    </div>

    <form th:action="@{/register}" method="post">
        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #2c3e50;">Name (Username)</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>

        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #2c3e50;">Password</label>
        <input type="password" name="password" placeholder="Enter your password" required minlength="6">

        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #2c3e50;">Select Role</label>
        <select name="role" required style="width: 100%; padding: 12px 15px; margin-top: 8px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 14px;">
            <option value="" disabled selected>Choose your role</option>
            <option value="USER">👤 User - Submit complaints</option>
            <option value="WORKER">👷 Worker - Handle assigned tasks</option>
            <option value="ADMIN">👔 Admin - Manage system</option>
        </select>

        <button type="submit" style="width: 100%; margin-top: 10px; font-size: 18px;">
            ✨ Register
        </button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <p style="color: #666; font-size: 14px;">
            Already have an account? 
            <a href="/login" style="color: #667eea; font-weight: 600;">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
