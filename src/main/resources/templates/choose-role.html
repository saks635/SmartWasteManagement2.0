<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Role - Waste Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #a5b4fc;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .subtitle span {
            color: #a5b4fc;
            font-weight: 600;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .roles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .role-card {
            position: relative;
            cursor: pointer;
        }

        .role-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-card label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-card label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-3px);
        }

        .role-card input[type="radio"]:checked + label {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.25);
        }

        .role-icon {
            font-size: 40px;
            line-height: 1;
        }

        .role-name {
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
        }

        .role-desc {
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            line-height: 1.4;
            text-align: center;
        }

        .role-card input[type="radio"]:checked + label .role-name {
            color: #a5b4fc;
        }

        /* Selected check mark */
        .role-card input[type="radio"]:checked + label::before {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .note {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .roles-grid { grid-template-columns: 1fr; }
            .card { padding: 32px 24px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="welcome-badge">
        🎉 Welcome to Smart Waste Management
    </div>

    <h1>What's your role?</h1>
    <p class="subtitle">
        Logged in as <span th:text="${userEmail}">user@gmail.com</span><br>
        Select how you'll be using this platform
    </p>

    <div th:if="${param.error}" class="error-msg">
        ⚠️ Something went wrong. Please select a valid role and try again.
    </div>

    <form th:action="@{/choose-role}" method="post">
        <div class="roles-grid">

            <!-- USER -->
            <div class="role-card">
                <input type="radio" id="role-user" name="role" value="USER" checked>
                <label for="role-user">
                    <span class="role-icon">🧑‍💼</span>
                    <span class="role-name">Citizen</span>
                    <span class="role-desc">Report waste issues in your area</span>
                </label>
            </div>

            <!-- WORKER -->
            <div class="role-card">
                <input type="radio" id="role-worker" name="role" value="WORKER">
                <label for="role-worker">
                    <span class="role-icon">👷</span>
                    <span class="role-name">Worker</span>
                    <span class="role-desc">Handle assigned cleaning tasks</span>
                </label>
            </div>

            <!-- ADMIN -->
            <div class="role-card">
                <input type="radio" id="role-admin" name="role" value="ADMIN">
                <label for="role-admin">
                    <span class="role-icon">🛡️</span>
                    <span class="role-name">Admin</span>
                    <span class="role-desc">Manage complaints and workers</span>
                </label>
            </div>

        </div>

        <button type="submit" class="submit-btn">
            Continue →
        </button>
    </form>

    <p class="note">⚠️ You won't be able to change your role later without contacting an admin.</p>
</div>

</body>
</html>
